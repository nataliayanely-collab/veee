const photoImg = new Image();
photoImg.src = PHOTO_SRC;

// ---- GLOBALS ----
let phase = 0; // 0=ingredients, 1=mixing, 2=puzzle
let t = 0;
let particles = [];
let ingredients = [];
let puzzlePieces = [];
let mixParticles = [];
let phaseTimer = 0;
const COLS = 4, ROWS = 5;

// Stars
const stars = Array.from({length:150}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.5+0.3,
  a: Math.random(), da: (Math.random()-0.5)*0.01
}));

// ---- INGREDIENT DEFINITIONS ----
const ingredientList = [
  { label:'Amor', emoji:'💖', color:'#ff6eb4', glow:'#ff2d8a' },
  { label:'Paz', emoji:'🕊️', color:'#a8e6ff', glow:'#5bc8ff' },
  { label:'Paciencia', emoji:'🌿', color:'#7fff9e', glow:'#00e040' },
  { label:'Cariño', emoji:'🌸', color:'#ffb3d9', glow:'#ff69b4' },
  { label:'Tranquilidad', emoji:'🌙', color:'#d4b3ff', glow:'#9b59ff' },
];

function initIngredients() {
  ingredients = ingredientList.map((ing, i) => ({
    ...ing,
    x: W/2 + Math.cos((i/ingredientList.length)*Math.PI*2)*200,
    y: H/2 + Math.sin((i/ingredientList.length)*Math.PI*2)*150,
    tx: W/2, ty: H/2 + 20,
    progress: 0,
    delay: i * 90,
    dropped: false,
    scale: 0,
    angle: 0,
    floatOffset: Math.random()*Math.PI*2,
  }));
}

function initMixing() {
  mixParticles = [];
  for (let i = 0; i < 300; i++) {
    const ing = ingredientList[Math.floor(Math.random()*ingredientList.length)];
    mixParticles.push({
      x: W/2 + (Math.random()-0.5)*200,
      y: H/2 + (Math.random()-0.5)*150,
      vx: (Math.random()-0.5)*8,
      vy: (Math.random()-0.5)*8,
      color: ing.color,
      glow: ing.glow,
      r: Math.random()*5+2,
      life: 1,
      decay: Math.random()*0.005+0.003,
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-0.5)*0.2,
    });
  }
}

function initPuzzle() {
  puzzlePieces = [];
  const pw = Math.floor(W * 0.7);
  const ph = Math.floor(pw * (photoImg.naturalHeight / photoImg.naturalWidth));
  const px0 = (W - pw) / 2;
  const py0 = (H - ph) / 2;
  const pieceW = pw / COLS;
  const pieceH = ph / ROWS;

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const angle = (Math.random()-0.5)*Math.PI*4;
      const dist = 400 + Math.random()*200;
      const startAngle = Math.random()*Math.PI*2;
      puzzlePieces.push({
        col, row,
        sx: col * pieceW, sy: row * pieceH,
        pw: pieceW, ph: pieceH,
        tx: px0 + col * pieceW, ty: py0 + row * pieceH,
        x: W/2 + Math.cos(startAngle)*dist,
        y: H/2 + Math.sin(startAngle)*dist,
        angle: angle,
        targetAngle: 0,
        progress: 0,
        delay: (row*COLS+col) * 40,
        imgX: col*(photoImg.naturalWidth/COLS),
        imgY: row*(photoImg.naturalHeight/ROWS),
        imgW: photoImg.naturalWidth/COLS,
        imgH: photoImg.naturalHeight/ROWS,
        glowAlpha: 0,
        glowDir: 1,
        sparkle: Math.random(),
      });
    }
  }
}

// ---- DRAW CAULDRON ----
function drawCauldron() {
  const cx = W/2, cy = H/2 + 60;
  // glow under
  const grd = ctx.createRadialGradient(cx, cy+30, 10, cx, cy+30, 120);
  grd.addColorStop(0,'rgba(180,80,255,0.3)');
  grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.ellipse(cx, cy+30, 120, 40, 0, 0, Math.PI*2); ctx.fill();

  // cauldron body
  ctx.beginPath();
  ctx.moveTo(cx-100, cy-30);
  ctx.bezierCurveTo(cx-110, cy+60, cx+110, cy+60, cx+100, cy-30);
  ctx.closePath();
  const bodyGrd = ctx.createLinearGradient(cx-100, cy-30, cx+100, cy+60);
  bodyGrd.addColorStop(0,'#2a1a3e');
  bodyGrd.addColorStop(0.5,'#3d2060');
  bodyGrd.addColorStop(1,'#1a0d2e');
  ctx.fillStyle = bodyGrd;
  ctx.fill();
  ctx.strokeStyle='#7a4aaa'; ctx.lineWidth=2; ctx.stroke();

  // rim
  ctx.beginPath(); ctx.ellipse(cx, cy-30, 100, 22, 0, 0, Math.PI*2);
  const rimGrd = ctx.createLinearGradient(cx-100, cy-52, cx+100, cy-8);
  rimGrd.addColorStop(0,'#5a2a8a'); rimGrd.addColorStop(0.5,'#9b59ff'); rimGrd.addColorStop(1,'#5a2a8a');
  ctx.fillStyle = rimGrd; ctx.fill();
  ctx.strokeStyle='#c084ff'; ctx.lineWidth=1.5; ctx.stroke();

  // liquid surface
  const waveT = t * 0.03;
  ctx.beginPath();
  ctx.ellipse(cx, cy-30, 90, 15, 0, 0, Math.PI*2);
  const liqGrd = ctx.createRadialGradient(cx-20, cy-35, 5, cx, cy-30, 90);
  liqGrd.addColorStop(0,'rgba(255,180,255,0.9)');
  liqGrd.addColorStop(0.4,'rgba(180,100,255,0.8)');
  liqGrd.addColorStop(1,'rgba(80,20,160,0.9)');
  ctx.fillStyle = liqGrd; ctx.fill();

  // bubbles
  for (let b=0; b<5; b++) {
    const bx = cx + Math.sin(waveT+b*1.3)*50;
    const by = cy - 30 + Math.cos(waveT*0.7+b*0.9)*8;
    ctx.beginPath(); ctx.arc(bx, by, 3+Math.sin(waveT+b)*2, 0, Math.PI*2);
    ctx.strokeStyle='rgba(255,220,255,0.7)'; ctx.lineWidth=1; ctx.stroke();
  }

  // legs
  [[-90,30],[90,30],[-70,50],[70,50]].forEach(([dx,dy]) => {
    ctx.beginPath();
    ctx.moveTo(cx+dx*0.8, cy+dy*0.5);
    ctx.lineTo(cx+dx, cy+dy+20);
    ctx.strokeStyle='#5a2a8a'; ctx.lineWidth=5; ctx.stroke();
  });
}

// ---- DRAW INGREDIENT ----
function drawIngredient(ing, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(ing.x, ing.y);
  ctx.rotate(ing.angle);
  ctx.scale(ing.scale, ing.scale);

  // glow
  const grd = ctx.createRadialGradient(0,0,5,0,0,40);
  grd.addColorStop(0, ing.glow+'88');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(0,0,40,0,Math.PI*2); ctx.fill();

  // orb
  ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2);
  const orbGrd = ctx.createRadialGradient(-8,-8,2,0,0,22);
  orbGrd.addColorStop(0,'white');
  orbGrd.addColorStop(0.3, ing.color);
  orbGrd.addColorStop(1, ing.glow);
  ctx.fillStyle = orbGrd; ctx.fill();

  // emoji
  ctx.font = '22px serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(ing.emoji, 0, -2);

  // label
  ctx.font = '500 10px Cormorant Garamond, serif';
  ctx.fillStyle = 'white';
  ctx.shadowColor = ing.glow; ctx.shadowBlur = 8;
  ctx.fillText(ing.label, 0, 32);

  ctx.restore();
}

// ---- DRAW MIXING VORTEX ----
function drawMixing(progress) {
  // swirling vortex
  const cx = W/2, cy = H/2;
  const vortexR = 120 + progress*50;
  for (let i=0; i<8; i++) {
    const a = (i/8)*Math.PI*2 + t*0.05;
    const r = vortexR * (0.5 + 0.5*Math.sin(t*0.03+i));
    const grd = ctx.createRadialGradient(
      cx+Math.cos(a)*r, cy+Math.sin(a)*r, 0,
      cx, cy, vortexR
    );
    const ing = ingredientList[i%ingredientList.length];
    grd.addColorStop(0, ing.glow+'cc');
    grd.addColorStop(1,'transparent');
    ctx.beginPath();
    ctx.arc(cx+Math.cos(a)*r, cy+Math.sin(a)*r, 30, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();
  }

  mixParticles.forEach(p => {
    if (p.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = p.life * 0.8;
    ctx.shadowColor = p.glow; ctx.shadowBlur = 12;
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y); ctx.rotate(p.angle);
    ctx.beginPath(); ctx.arc(0,0, p.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ---- DRAW PUZZLE ----
function drawPuzzle() {
  puzzlePieces.forEach(piece => {
    if (piece.progress <= 0) return;
    const curX = lerp(piece.x, piece.tx, easeOut(piece.progress));
    const curY = lerp(piece.y, piece.ty, easeOut(piece.progress));
    const curA = lerp(piece.angle, piece.targetAngle, easeOut(piece.progress));

    ctx.save();
    ctx.translate(curX + piece.pw/2, curY + piece.ph/2);
    ctx.rotate(curA);

    // glow on piece
    if (piece.progress < 1) {
      ctx.shadowColor = '#d4b3ff';
      ctx.shadowBlur = 20 * (1 - piece.progress) + 5;
    }

    // clip to rectangle
    ctx.beginPath();
    ctx.rect(-piece.pw/2, -piece.ph/2, piece.pw, piece.ph);
    ctx.clip();

    // draw image slice
    const pw = Math.floor(canvas.width * 0.7);
    const ph = Math.floor(pw * (photoImg.naturalHeight / photoImg.naturalWidth));
    ctx.drawImage(
      photoImg,
      piece.imgX, piece.imgY, piece.imgW, piece.imgH,
      -piece.pw/2, -piece.ph/2, piece.pw, piece.ph
    );

    // sparkle overlay
    if (piece.progress < 1) {
      ctx.fillStyle = `rgba(255,240,255,${(1-piece.progress)*0.3})`;
      ctx.fillRect(-piece.pw/2, -piece.ph/2, piece.pw, piece.ph);
    }

    // piece border
    ctx.strokeStyle = `rgba(200,150,255,${0.6-piece.progress*0.4})`;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-piece.pw/2, -piece.ph/2, piece.pw, piece.ph);

    ctx.restore();
  });

  // Check if complete and draw overlay
  const allDone = puzzlePieces.every(p => p.progress >= 1);
  if (allDone && puzzlePieces.length > 0) {
    // Soft vignette glow around completed photo
    const pw = Math.floor(W * 0.7);
    const ph = Math.floor(pw * (photoImg.naturalHeight / photoImg.naturalWidth));
    const px0 = (W - pw) / 2, py0 = (H - ph) / 2;
    const grd = ctx.createRadialGradient(W/2,H/2,pw*0.3, W/2,H/2,pw*0.7);
    grd.addColorStop(0,'transparent');
    grd.addColorStop(1,'rgba(150,80,255,0.25)');
    ctx.fillStyle = grd;
    ctx.fillRect(px0-20, py0-20, pw+40, ph+40);

    // floating hearts
    for (let i=0; i<6; i++) {
      const ha = (i/6)*Math.PI*2 + t*0.008;
      const hr = pw*0.52;
      const hx = W/2 + Math.cos(ha)*hr;
      const hy = H/2 + Math.sin(ha)*hr * (ph/pw);
      ctx.font = `${20+Math.sin(t*0.02+i)*5}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.globalAlpha = 0.7+Math.sin(t*0.02+i)*0.3;
      ctx.fillText('💖', hx, hy);
      ctx.globalAlpha = 1;
    }

    document.getElementById('msg').style.opacity = '1';
  }
}

// ---- HELPERS ----
function lerp(a, b, t) { return a + (b-a)*t; }
function easeOut(t) { return 1-(1-t)*(1-t)*(1-t); }
function easeInOut(t) { return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

// ---- MAIN LOOP ----
function update() {
  phaseTimer++;
  t++;

  if (phase === 0) {
    // Phase 0: drop ingredients into cauldron
    let allDropped = true;
    ingredients.forEach(ing => {
      if (phaseTimer < ing.delay) { allDropped = false; return; }
      ing.scale = Math.min(1, ing.scale + 0.04);
      if (!ing.dropped) {
        ing.progress = Math.min(1, ing.progress + 0.012);
        ing.angle = Math.sin(t*0.05 + ing.floatOffset)*0.15;
        ing.x = lerp(W/2 + Math.cos((ingredientList.indexOf(ing)/ingredientList.length)*Math.PI*2)*200, ing.tx, easeInOut(ing.progress));
        ing.y = lerp(H/2 + Math.sin((ingredientList.indexOf(ing)/ingredientList.length)*Math.PI*2)*150 - 100, ing.ty - 80, easeInOut(ing.progress));
        if (ing.progress < 1) allDropped = false;
        if (ing.progress >= 1) { ing.dropped = true; }
      }
    });
    if (allDropped && phaseTimer > 300) {
      phase = 1;
      phaseTimer = 0;
      initMixing();
    }
  }

  if (phase === 1) {
    // Phase 1: mixing / vortex
    mixParticles.forEach(p => {
      const dx = W/2 - p.x, dy = H/2 - p.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const pull = 0.04 + (phaseTimer/3000)*0.1;
      p.vx += dx * pull / (dist+1);
      p.vy += dy * pull / (dist+1);
      // perpendicular spin
      p.vx += -dy/(dist+1) * 1.5;
      p.vy += dx/(dist+1) * 1.5;
      p.vx *= 0.97; p.vy *= 0.97;
      p.x += p.vx; p.y += p.vy;
      p.angle += p.spin;
      p.life -= p.decay * 0.5;
    });
    if (phaseTimer > 280) {
      phase = 2;
      phaseTimer = 0;
      initPuzzle();
    }
  }

  if (phase === 2) {
    // Phase 2: puzzle assembles
    puzzlePieces.forEach(piece => {
      if (phaseTimer < piece.delay) return;
      piece.progress = Math.min(1, piece.progress + 0.008);
    });
  }
}

function drawStars() {
  stars.forEach(s => {
    s.a += s.da;
    if (s.a < 0 || s.a > 1) s.da *= -1;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,230,255,${s.a * 0.8})`; ctx.fill();
  });
}

function drawTitle() {
  ctx.save();
  ctx.font = '700 1.6rem Cinzel Decorative, serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,200,255,0.85)';
  ctx.shadowColor = '#d4b3ff'; ctx.shadowBlur = 20;
  if (phase === 0) ctx.fillText('✨ Ingredientes del Amor ✨', W/2, 55);
  else if (phase === 1) ctx.fillText('🌀 Mezclando... 🌀', W/2, 55);
  else ctx.fillText('💖 Resultado 💖', W/2, 55);
  ctx.restore();
}

function draw() {
  // Background
  const bgGrd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.8);
  bgGrd.addColorStop(0,'#1a0d30');
  bgGrd.addColorStop(0.6,'#0d0820');
  bgGrd.addColorStop(1,'#06020f');
  ctx.fillStyle = bgGrd;
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawTitle();

  if (phase === 0) {
    drawCauldron();
    ingredients.forEach(ing => drawIngredient(ing, ing.scale));
  }

  if (phase === 1) {
    drawCauldron();
    const progress = phaseTimer / 280;
    drawMixing(progress);
  }

  if (phase === 2) {
    drawPuzzle();
  }

  update();
  requestAnimationFrame(draw);
}

// ---- INIT ----
initIngredients();
photoImg.onload = () => { /* ready */ };
draw();

// restart on click
canvas.addEventListener('click', () => {
  phase = 0; phaseTimer = 0; t = 0;
  document.getElementById('msg').style.opacity = '0';
  initIngredients();
  mixParticles = []; puzzlePieces = [];
});
</script>
</body>
